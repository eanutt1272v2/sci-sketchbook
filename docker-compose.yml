services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:10000"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./sketchbook:/srv
      - caddy_data:/sketchbook
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
