services:
  caddy:
    build:
      context: .
      dockerfile: Containerfile
    container_name: sci-sketchbook
    restart: unless-stopped
    environment:
      PORT: 10000
    ports:
      - "${HOST_HTTP_PORT:-8080}:10000"
      - "${HOST_HTTPS_PORT:-8443}:443"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro,Z
      - ./library:/srv:ro,Z
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
