services:
  - type: web
    name: sci-sketchbook
    env: docker
    buildCommand: "# No build command needed for Caddy Docker image"
    startCommand: "caddy run --config /etc/caddy/Caddyfile --adapter caddyfile"
    healthCheckPath: /
    ports:
      - 80
      - 443
    envVars:
      - key: CADDY_HTTP_PORT
        value: 80
      - key: CADDY_HTTPS_PORT
        value: 443
