services:
  - type: web
    name: sci-sketchbook
    env: docker
    # Render's free tier/standard web services bind to a single port (usually 10000 or $PORT)
    # Caddy will automatically bind to $PORT if we tell it to.
    buildCommand: "# No build command needed for Caddy Docker image"
    # We remove the explicit startCommand to let Dockerfile CMD handle it
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 10000
